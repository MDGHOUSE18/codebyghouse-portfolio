@if (showCursor()) {
  <div class="cursor-dot" [style.transform]="getDotTransform()"></div>
  <div class="cursor-follower" 
       [class.hovering]="cursorService.isHovering()"
       [class.clicking]="cursorService.isClicking()"
       [style.transform]="getFollowerTransform()">
    @if (cursorService.cursorText(); as text) {
      <span class="cursor-text">{{ text }}</span>
    }
  </div>
}
