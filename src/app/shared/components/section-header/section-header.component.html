<div class="section-header" [class.centered]="centered()">
  @if (label()) {
    <p class="section-eyebrow">{{ label() }}</p>
  }
  @if (title()) {
    <h2 class="section-headline">{{ title() }}</h2>
  } @else {
    <h2 class="section-headline">
      @for (line of titleLines(); track line) {
        <span class="headline-line">{{ line }}</span>
      }
    </h2>
  }
  @if (description()) {
    <p class="section-lead">{{ description() }}</p>
  }
</div>
