<section id="skills" class="landing-section skills-section" data-section="skills">
  <div class="container">
    <app-section-header
      appReveal
      label="Tech Stack"
      title="Tools I build with every day"
      description="A focused toolkit for enterprise web applications — backend, frontend, and data."
      [centered]="true" />

    <div class="skills-grid" appReveal [revealStagger]="80">
      @for (category of SKILL_CATEGORIES; track category.id) {
        <div class="skill-category">
          <div class="category-head">
            <span class="category-dot"></span>
            <h3 class="category-name">{{ category.name }}</h3>
          </div>
          <p class="category-desc">{{ category.description }}</p>
          <ul class="skill-list">
            @for (skill of category.skills; track skill.name) {
              <li>{{ skill.name }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
