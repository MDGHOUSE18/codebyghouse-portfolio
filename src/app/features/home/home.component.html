<div class="landing">
  <section id="home" class="hero" data-section="home">
    <div class="hero-bg">
      <svg class="hero-watermark" #heroWatermark viewBox="0 0 200 200" fill="none" aria-hidden="true">
        <path d="M100 10L190 100L100 190L10 100L100 10Z" stroke="currentColor" stroke-width="0.5"/>
        <path d="M100 40L160 100L100 160L40 100L100 40Z" stroke="currentColor" stroke-width="0.5"/>
      </svg>
    </div>

    <div class="hero-inner">
      <p class="hero-eyebrow" #heroEyebrow>Available for new projects</p>

      <h1 class="hero-headline" #heroHeadline>
        <span class="headline-line headline-sm">Hi, I'm Ghouse</span>
        <span class="headline-line headline-lg">.NET Full Stack Developer</span>
      </h1>

      <p class="hero-subline" #heroSubline>{{ PROFILE.tagline }}</p>

      <div class="hero-cta-wrap" #heroCta>
        <app-magnetic-button variant="solid" (click)="scrollToProjects()">
          View My Work
        </app-magnetic-button>
      </div>
    </div>

    <div class="scroll-hint" aria-hidden="true">
      <span>scroll to explore</span>
    </div>
  </section>

  <app-projects />
  <app-skills />
  <app-about />
  <app-contact />
</div>
