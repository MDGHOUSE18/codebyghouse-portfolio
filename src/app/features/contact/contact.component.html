<section id="contact" class="landing-section contact-section" data-section="contact">
  <div class="container">
    <app-section-header
      appReveal
      label="Get In Touch"
      title="Tell me about your project"
      description="Have something in mind? I'd love to hear about it."
      [centered]="true" />

    <div class="contact-meta" appReveal>
      <a [href]="'mailto:' + PROFILE.email" class="meta-link">{{ PROFILE.email }}</a>
      <span class="meta-sep">·</span>
      <a [href]="PROFILE.linkedin" target="_blank" rel="noopener" class="meta-link"
        >LinkedIn</a
      >
      <span class="meta-sep">·</span>
      <span class="meta-text">{{ PROFILE.location }}</span>
    </div>

    <form class="contact-form" (ngSubmit)="submitForm()" #form="ngForm" appReveal>
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          [(ngModel)]="formData.name"
          required
          autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="formData.email"
          required
          autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          [(ngModel)]="formData.message"
          required
          rows="6"></textarea>
      </div>

      <app-magnetic-button variant="solid">
        Send message
      </app-magnetic-button>

      @if (submitStatus() === 'success') {
        <p class="form-status success" role="status">
          Thanks for your message. I'll get back to you soon.
        </p>
      }
      @if (submitStatus() === 'error') {
        <p class="form-status error" role="alert">
          Something went wrong. Please try again or email me directly.
        </p>
      }
    </form>
  </div>
</section>
