<section class="certifications-section">
  <div class="container">
    <app-section-header 
      label="Certifications"
      [titleLines]="['Credentials &', 'Professional Development']"
      [accentLine]="0"
      description="Continuous learning through industry-recognized certifications and training programs."
    />

    <div class="certifications-grid">
      @for (cert of CERTIFICATIONS; track cert.id; let i = $index) {
        <div class="cert-card" [style.animation-delay]="(i * 0.1) + 's'">
          <div class="cert-icon">{{ getCertIcon(cert.icon) }}</div>

          <div class="cert-content">
            <div class="cert-category">{{ cert.category }}</div>
            <h3 class="cert-name">{{ cert.name }}</h3>
            <p class="cert-issuer">{{ cert.issuer }}</p>
            <p class="cert-date">Issued {{ cert.date }}</p>

            <div class="cert-skills">
              @for (skill of cert.skills; track skill) {
                <span class="skill-tag">{{ skill }}</span>
              }
            </div>
          </div>

          @if (cert.credentialUrl) {
            <a [href]="cert.credentialUrl" target="_blank" rel="noopener" class="verify-link">
              Verify →
            </a>
          }
        </div>
      }
    </div>
  </div>
</section>
