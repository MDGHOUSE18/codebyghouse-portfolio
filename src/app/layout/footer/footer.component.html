<footer class="footer">
  <div class="footer-container">
    <nav class="footer-nav">
      @for (item of navItems; track item.id) {
        <a
          [href]="'#' + item.id"
          class="footer-nav-link"
          (click)="scrollToSection(item.id, $event)">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="footer-bottom">
      <p class="copyright">
        &copy; {{ currentYear }} {{ PROFILE.name.split(' ').slice(1).join(' ') }}
        &middot; {{ PROFILE.location }}
        &middot;
        <a [href]="'mailto:' + PROFILE.email">{{ PROFILE.email }}</a>
      </p>
      <div class="footer-socials">
        @for (link of SOCIAL_LINKS; track link.name) {
          <a
            [href]="link.url"
            target="_blank"
            rel="noopener"
            class="social-link"
            [attr.aria-label]="link.name">
            {{ link.name }}
          </a>
        }
      </div>
    </div>
  </div>
</footer>
